name: bookking

services:
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookking}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase_admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://supabase_admin:${POSTGRES_PASSWORD:-bookking}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
    ports:
      - "127.0.0.1:55321:3000"

  app:
    image: ghcr.io/pexmee/bookking:${BOOKKING_VERSION:-latest}
    build: ./app
    pull_policy: missing
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://supabase_admin:${POSTGRES_PASSWORD:-bookking}@db:5432/postgres
      FX_API_URL: ${FX_API_URL:-https://api.frankfurter.app}
      DEFAULT_DISPLAY_CURRENCY: ${DEFAULT_DISPLAY_CURRENCY:-USD}
      BOOKKING_AUTH_USERS: ${BOOKKING_AUTH_USERS:-}
    expose:
      - "3000"

  caddy:
    build: ./caddy
    restart: unless-stopped
    depends_on:
      - app
    environment:
      BOOKKING_DOMAIN: ${BOOKKING_DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
      BOOKKING_TLS_SANS: ${BOOKKING_TLS_SANS:-}
    ports:
      # Localhost only (default). For LAN access change to "0.0.0.0:443:443" — see README.
      - "0.0.0.0:443:443"
    volumes:
      - ./certs:/etc/certs:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
